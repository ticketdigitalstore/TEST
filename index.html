<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKB RUN FEST</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f1f5f9;
overflow-x:hidden;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.header{
background:#fff;
padding:25px;
text-align:center;
border-radius:0 0 25px 25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
animation:down .5s ease;
}

.logo{
font-size:34px;
font-weight:700;
color:#111827;
}

.logo span{
color:#2563eb;
}

.timer{
margin-top:15px;
background:#ef4444;
color:white;
padding:10px;
border-radius:12px;
font-weight:600;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
animation:up .5s ease;
}

.step{
display:none;
}

.active{
display:block;
}

h2{
margin-bottom:20px;
color:#111827;
}

label{
display:block;
margin-top:15px;
margin-bottom:7px;
font-weight:500;
}

input,
select{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus,
select:focus{
border-color:#2563eb;
box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

.qty-box{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin-top:20px;
}

.qty-btn{
width:50px;
height:50px;
border:none;
border-radius:50%;
background:#2563eb;
color:white;
font-size:28px;
cursor:pointer;
}

.qty-number{
font-size:28px;
font-weight:700;
}

.participant{
background:#f8fafc;
padding:15px;
border-radius:16px;
margin-top:20px;
animation:fade .4s ease;
}

.participant-title{
background:#1d4ed8;
color:white;
padding:12px;
border-radius:10px;
margin-bottom:15px;
font-weight:600;
}

.total{
margin-top:20px;
font-size:22px;
font-weight:700;
color:#111827;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
margin-top:20px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.02);
}

.btn:disabled{
background:#94a3b8;
cursor:not-allowed;
transform:none;
}

.qris{
width:100%;
margin-top:20px;
border-radius:18px;
border:4px solid #e5e7eb;
}

.loading{
position:fixed;
inset:0;
background:rgba(15,23,42,.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
z-index:9999;
}

.spinner{
width:70px;
height:70px;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

.success{
text-align:center;
padding:50px 20px;
}

.success h1{
color:#16a34a;
margin-bottom:15px;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes down{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes up{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="spinner"></div>
<h2>Memproses Pembayaran...</h2>
<p>Mohon tunggu 10 detik</p>
</div>

<div class="container">

<div class="header">
<div class="logo">PKB <span>RUN</span> FEST</div>
<div class="timer" id="timer">10:00</div>
</div>

<div class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
<h2>Pilih Tiket</h2>

<label>Kategori Tiket</label>
<select id="ticket" onchange="updateTotal(); validateStep1()">
<option value="">-- Pilih Tiket --</option>
<option value="175000">10K - Rp.175.000</option>
<option value="100000">5K - Rp.100.000</option>
<option value="250000">VIP - Rp.250.000</option>
</select>

<div class="qty-box">
<button class="qty-btn" onclick="minus()">-</button>
<div class="qty-number" id="qty">1</div>
<button class="qty-btn" onclick="plus()">+</button>
</div>

<div class="total" id="total">Total : Rp.175.000</div>

<button class="btn" id="btnStep1" disabled onclick="nextStep(2)">
Lanjut Isi Data
</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h2>Data Peserta</h2>
<div id="forms"></div>

<button class="btn" id="btnCheckout" disabled onclick="goCheckout()">
Checkout
</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h2>Pembayaran</h2>

<div class="total" id="finalTotal"></div>

<img src="qris.png" class="qris">

<button class="btn" id="payBtn" disabled onclick="payNow()">
Bayar Sekarang
</button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<div class="success">
<h1>Pendaftaran Berhasil</h1>
<p>Terima kasih telah mendaftar PKB RUN FEST</p>
</div>
</div>

</div>
</div>

<script>

let quantity = 1;
let price = 175000;

function updateTotal(){

const ticket = document.getElementById('ticket');
price = parseInt(ticket.value || 0);

const total = quantity * price;

document.getElementById('total').innerHTML =
'Total : Rp.' + total.toLocaleString('id-ID');

document.getElementById('finalTotal').innerHTML =
'Total Bayar : Rp.' + total.toLocaleString('id-ID');

validateStep1();
}

function plus(){
quantity++;
document.getElementById('qty').innerText = quantity;
updateTotal();
renderForms();
}

function minus(){
if(quantity > 1){
quantity--;
document.getElementById('qty').innerText = quantity;
updateTotal();
renderForms();
}
}

function validateStep1(){
const ticket = document.getElementById('ticket').value;
document.getElementById('btnStep1').disabled = !ticket;
}

function nextStep(step){
document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
document.getElementById('step'+step).classList.add('active');
}

function renderForms(){

const forms = document.getElementById('forms');
forms.innerHTML = '';

for(let i=1;i<=quantity;i++){

forms.innerHTML += `

<div class="participant">
<div class="participant-title">DATA PESERTA ${i}</div>

<label>Nama Sesuai KTP</label>
<input type="text" class="requiredField" oninput="validateForms()">

<label>Tanggal Lahir</label>
<input type="date" class="requiredField" onchange="validateForms()">

<label>Whatsapp</label>
<input type="number" class="requiredField" oninput="validateForms()">

<label>Email</label>
<input type="email" class="requiredField emailField" oninput="validateForms()">

<label>Konfirmasi Email</label>
<input type="email" class="requiredField confirmEmail" oninput="validateForms()">

<label>Jenis Kelamin</label>
<select class="requiredField" onchange="validateForms()">
<option value="">Pilih Jenis Kelamin</option>
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<label>Upload KTP</label>
<input type="file" accept="image/*" class="requiredField" onchange="validateForms()">

</div>

`;
}

validateForms();
}

function validateForms(){

let valid = true;

const fields = document.querySelectorAll('.requiredField');

fields.forEach(field=>{

if(field.type === 'file'){
if(field.files.length === 0){
valid = false;
}
}else{
if(field.value.trim() === ''){
valid = false;
}
}

});

const emails = document.querySelectorAll('.emailField');
const confirms = document.querySelectorAll('.confirmEmail');

emails.forEach((email,index)=>{

const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!regex.test(email.value)){
valid = false;
email.style.borderColor = 'red';
}else{
email.style.borderColor = '#d1d5db';
}

if(email.value !== confirms[index].value){
valid = false;
confirms[index].style.borderColor = 'red';
}else{
confirms[index].style.borderColor = '#d1d5db';
}

});


document.getElementById('btnCheckout').disabled = !valid;
document.getElementById('payBtn').disabled = !valid;

}

function goCheckout(){
validateForms();

if(!document.getElementById('btnCheckout').disabled){
nextStep(3);
}
}

function payNow(){

validateForms();

if(document.getElementById('payBtn').disabled){
return;
}

const loading = document.getElementById('loading');
loading.style.display = 'flex';

setTimeout(()=>{
loading.style.display = 'none';
nextStep(4);
},10000);
}

renderForms();
updateTotal();

// COUNTDOWN
let duration = 600;

const timer = setInterval(()=>{

let minutes = Math.floor(duration / 60);
let seconds = duration % 60;

minutes = minutes < 10 ? '0'+minutes : minutes;
seconds = seconds < 10 ? '0'+seconds : seconds;


document.getElementById('timer').innerHTML = minutes + ':' + seconds;

if(duration <= 0){
clearInterval(timer);
alert('Waktu pengisian habis');
location.reload();
}


duration--;

},1000);

</script>

</body>
</html>
